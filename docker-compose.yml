services:
  db:
    image: postgres:16-alpine
    container_name: redland-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: redland
      POSTGRES_PASSWORD: redland
      POSTGRES_DB: redland
    ports:
      - "5432:5432"
    volumes:
      - redland_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redland"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: redland-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://redland:redland@db:5432/redland
      JWT_SECRET: change-me-in-production-redland-2026
      PORT: "4000"
      NODE_ENV: production
    ports:
      - "4000:4000"
    command: sh -c "npx prisma db push --accept-data-loss && node dist/seed.js && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: redland-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  redland_db_data:
